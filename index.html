<!DOCTYPE html>\n<html lang="pt-BR">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Portal de Transparência IBICT</title>\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">\n</head>\n<body class="bg-gray-100">\n    <header class="bg-blue-600 text-white p-4">\n        <h1 class="text-2xl font-bold">Portal de Transparência IBICT</h1>\n    </header>\n    <main class="p-4">\n        <div class="bg-white shadow-md rounded-lg p-6">\n            <h2 class="text-xl font-semibold mb-4">Bem-vindo ao Portal</h2>\n            <p>Acesse informações transparentes sobre as atividades do IBICT.</p>\n            <button id="interactiveButton" class="mt-4 bg-blue-500 text-white py-2 px-4 rounded">Clique para Interagir</button>\n            <div id="interactionResult" class="mt-2"></div>\n        </div>\n    </main>\n    <script>\n        document.getElementById('interactiveButton').addEventListener('click', function() {\n            document.getElementById('interactionResult').innerText = 'Interatividade ativada!';\n        });\n    <\/script>\n</body>\n</html>
